# Application Configuration
spring.application.name=datn_slife
server.http2.enabled=true
spring.profiles.active=${SPRING_PROFILE:local}
spring.jackson.time-zone=${TZ:GMT+7}
server.port=${PORT:8089}

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5439/datn_slife
spring.datasource.username=pguser
spring.datasource.password=pgpassword
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:public}
# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false
spring.jta.enabled=false

# SQL Initialization (Disable Spring's default initialization, use Flyway)
spring.sql.init.mode=never
spring.sql.init.platform=postgresql

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.default-schema=${DB_SCHEMA:public}
spring.flyway.schemas=${DB_SCHEMA:public}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=false
spring.flyway.out-of-order=false
spring.flyway.ignore-migration-patterns=*:missing

# JWT Configuration
jwt.secretKey=${JWT_SECRETKEY:your-secret-key-change-in-production}
jwt.issuer=${JWT_ISSUER:S-Life}
jwt.expirationMinute=${JWT_EXPIRATIONMINUTE:1440}

# Swagger Configuration
swagger.app-name=${SWAGGER_APPNAME:S-Life API}
swagger.app-description=${SWAGGER_APPDESCRIPTION:API Documentation for S-Life Graduation Project}
swagger.app-version=${SWAGGER_APPDESCRIPTION:API Documentation for S-Life Graduation Project}
swagger.app-version=${SWAGGER_APPVERSION:1.0.0}
swagger.app-license=${SWAGGER_APPLICENSE:Apache 2.0}
swagger.app-license-url=${SWAGGER_APPLICENSE_URL:https://www.apache.org/licenses/LICENSE-2.0.html}
swagger.contact-name=${SWAGGER_CONTACTNAME:Hoan}
swagger.contact-mail=${SWAGGER_CONTACTMAIL:dev@example.com}
swagger.contact-url=${SWAGGER_CONTACTURL:https://example.com}

# Actuator Configuration
springdoc.show-actuator=true
management.endpoint.health.show-details=ALWAYS
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=*

# Logging Configuration
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.org.springframework=${LOGGING_LEVEL_SPRINGFRAMEWORK:INFO}
logging.level.org.springframework.security=${LOGGING_LEVEL_SPRINGFRAMEWORK_SECURITY:DEBUG}
logging.level.com.haihoan2874.techhub=${LOGGING_LEVEL_COM_TECHHUB:DEBUG}
logging.level.org.flywaydb=${LOGGING_LEVEL_FLYWAY:TRACE}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# DevTools Configuration (Hot Reload)
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2000
spring.devtools.restart.quiet-period=1000
spring.devtools.livereload.enabled=true
spring.devtools.add-properties=true

# Redis Configuration (For Cart & Session)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:hoanhonghot85@gmail.com}
spring.mail.password=${MAIL_PASSWORD:qgsagnmmctuggkko}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OAuth2 Configuration (Google)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

# VNPay Configuration
vnp.tmn-code=${VNP_TMN_CODE:your-tmn-code}
vnp.hash-secret=${VNP_HASH_SECRET:your-hash-secret}
vnp.pay-url=${VNP_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnp.return-url=${VNP_RETURN_URL:http://localhost:8089/api/v1/payments/vnpay-callback}
vnp.version=2.1.0
vnp.command=pay

# Gemini AI Configuration
gemini.api-key=${GEMINI_API_KEY:your-gemini-api-key}
gemini.api-url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent}

